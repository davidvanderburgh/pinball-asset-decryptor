name: Tests

# Runs the test suite on push to main and every pull request.
# Matrix covers all three supported host OSes; per-platform setup
# installs whatever extra tooling those tests need (gpg, xvfb).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pycryptodome
          # Pillow is in requirements.txt — Williams' DMD render
          # path (dmd_render.py, capture_pipeline.py) imports it at
          # module load, so missing it causes the Williams plugin
          # to silently fail to load and disappear from the
          # manufacturer registry.  Installing requirements.txt
          # picks that up.
          pip install -r requirements.txt

      # gpg is needed for the BOF .fun round-trip + Spooky's GPG-symmetric
      # flows on Linux and macOS, where the app calls a host-side gpg
      # directly.  Skip the Windows install -- BOF on Windows uses
      # gpg-inside-WSL through the executor, not host gpg, so a host
      # gpg install wouldn't reflect real usage AND winget install of
      # Gpg4win/GnuPG takes 1-2 minutes per run.  The BOF tests skip
      # cleanly via HAS_GPG on Windows runners.
      - name: Install gpg + xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gnupg xvfb

      - name: Install gpg (macOS)
        if: runner.os == 'macOS'
        run: brew install gnupg

      # Tk needs a display on Linux.  xvfb-run wraps the test command
      # with a virtual X server.  Mac + Windows runners can open Tk
      # directly without setup.
      # test_gui_smoke.py is excluded because the hosted Windows runner
      # image has been intermittently shipping a broken Tk install
      # (missing panedwindow.tcl / init.tcl), which surfaces as
      # _tkinter.TclError at `tk.Tk()` regardless of test logic.  The
      # remaining 250+ tests still exercise the picker / mfr-switch /
      # log persistence behaviour through their non-GUI entry points,
      # and the GUI smoke suite is run manually before tagging.
      - name: Run tests (Linux, under xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a python -m pytest tests -v --ignore=tests/test_gui_smoke.py

      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: python -m pytest tests -v --ignore=tests/test_gui_smoke.py
