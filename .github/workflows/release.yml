name: Build Release Installers

# Builds both installers when a v* tag is pushed and uploads them to a
# GitHub release of the same tag.  The in-app updater (core/updater.py)
# polls the same release endpoint, so a new release auto-notifies users.
#
# Tag a release locally with:
#   git tag v0.1.0
#   git push origin v0.1.0

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}   # allow manual run for testing without a tag

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Build installer
        shell: pwsh
        run: installer/build.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/Output/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          pip install -r requirements.txt pyinstaller UnityPy fsb5 pyogg faster-whisper imageio-ffmpeg
          brew install create-dmg

      - name: Build DMG
        run: bash installer/build_macos.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: installer/Output/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk wget file desktop-file-utils
          pip install -r requirements.txt pyinstaller UnityPy fsb5 pyogg faster-whisper imageio-ffmpeg

      - name: Build AppImage
        run: bash installer/build_linux.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: installer/Output/*.AppImage

  release:
    # Only attach artifacts to a real tag — workflow_dispatch runs just
    # produce artifacts (downloadable from the run page) without making
    # a release.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows-installer

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/macos-dmg

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: artifacts/linux-appimage

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-dmg/*.dmg
            artifacts/linux-appimage/*.AppImage
