name: Build Release Installers

# Builds the installers when a v* tag is pushed and uploads them to a
# GitHub release of the same tag.  The in-app updater (core/updater.py)
# polls the same release endpoint, so a new release auto-notifies users.
#
# Each build job attaches its own asset to the release as soon as it
# finishes -- there is deliberately NO aggregator job.  A single
# "download everything then publish" job gates every asset on the
# slowest build (the Intel mac DMG takes ~4x the others) and turns any
# one job's failure into zero assets published.  With per-job attach,
# Windows/Linux/Apple Silicon are downloadable ~3 minutes after the
# tag while Intel catches up.
#
# Tag a release locally with:
#   git tag v0.1.0
#   git push origin v0.1.0

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}   # allow manual run for testing without a tag

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Build installer
        shell: pwsh
        run: installer/build.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/Output/*.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --json id >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes \
            || true
          gh release upload "$GITHUB_REF_NAME" installer/Output/*.exe --clobber

  build-macos:
    # PyInstaller builds for the host arch only and macos-latest has been
    # an Apple Silicon (arm64) runner since 2024, so a single job would
    # ship an arm64-only .app that Intel iMacs refuse to launch ("not
    # supported on this type of Mac" -- Rosetta only goes x86_64->arm64).
    # Build one DMG per architecture; build_macos.sh names each by arch.
    # macos-15-intel is a standard (free-tier) x64 label, unlike -large.
    # Note the Intel wheel floors: onnxruntime resolves to 1.23.x there
    # (last release with a macOS x86_64 wheel), which needs macOS 13+.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          pip install -r requirements.txt pyinstaller UnityPy fsb5 pyogg faster-whisper imageio-ffmpeg
          brew install create-dmg

      - name: Build DMG
        run: bash installer/build_macos.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.arch }}
          path: installer/Output/*.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --json id >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes \
            || true
          gh release upload "$GITHUB_REF_NAME" installer/Output/*.dmg --clobber

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk wget file desktop-file-utils
          pip install -r requirements.txt pyinstaller UnityPy fsb5 pyogg faster-whisper imageio-ffmpeg

      - name: Build AppImage
        run: bash installer/build_linux.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: installer/Output/*.AppImage

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --json id >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes \
            || true
          gh release upload "$GITHUB_REF_NAME" installer/Output/*.AppImage --clobber
