[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --tb=short
markers =
    requires_gpg: needs a host-side gpg binary on PATH (BOF flow, some Spooky flows)
    requires_display: needs a usable Tk display (xvfb on Linux CI)
    requires_wsl: needs WSL2 + Ubuntu (Windows-only; skipped elsewhere)
    requires_docker: needs Docker Desktop (macOS Clonezilla flow)
    slow: takes more than a couple of seconds
